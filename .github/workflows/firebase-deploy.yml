name: Deploy to Firebase
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Stamp build version
        run: |
          BUILD_NUM=${{ github.run_number }}
          BUILD_TIME=$(TZ='America/Los_Angeles' date '+%-I:%M %p PT')
          BUILD_DATE=$(TZ='America/Los_Angeles' date '+%b %-d')
          STAMP="v.${BUILD_NUM} — ${BUILD_DATE} ${BUILD_TIME}"
          sed -i "s|<!--BUILD_STAMP-->.*<!--/BUILD_STAMP-->|<!--BUILD_STAMP--><meta name=\"build-num\" content=\"${BUILD_NUM}\"><div id=\"build-stamp\" style=\"position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.85);font-family:-apple-system,system-ui,sans-serif;z-index:2147483647;pointer-events:none;user-select:none;\">${STAMP}</div><!--/BUILD_STAMP-->|g" index.html
          echo "Stamped build: ${STAMP}"
      - uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: lvr-data-a60c1
