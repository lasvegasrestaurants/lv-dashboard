name: Deploy to Firebase
on:
  push:
    branches: [ main ] 
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Stamp build version
        run: |
          BUILD_NUM=${{ github.run_number }}
          BUILD_TIME=$(TZ='America/Los_Angeles' date '+%-I:%M %p PT')
          BUILD_DATE=$(TZ='America/Los_Angeles' date '+%b %-d')
          STAMP="v.${BUILD_NUM} — ${BUILD_DATE} ${BUILD_TIME}"
          sed -i "s|<!--BUILD_STAMP-->.*<!--/BUILD_STAMP-->|<!--BUILD_STAMP--><div id=\"build-stamp\" style=\"position:fixed;bottom:4px;right:6px;font-size:10px;color:rgba(150,150,150,0.55);font-family:monospace;z-index:99999;pointer-events:none;user-select:none;\">${STAMP}</div><!--/BUILD_STAMP-->|g" index.html
          echo "Stamped build: ${STAMP}"
      - uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: lvr-data-a60c1
